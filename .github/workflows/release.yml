name: 构建并发布安装包

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.1 这样的 tag 时自动触发
  workflow_dispatch:  # 也支持手动在 GitHub Actions 页面触发

jobs:
  # ────────────────────────────────────────────
  # Linux 打包：生成 .deb 和 .rpm
  # ────────────────────────────────────────────
  build-linux:
    name: Linux 打包
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm install

      - name: 打包（deb + rpm，跳过 AppImage）
        run: npm run tauri build -- --bundles deb,rpm

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  # ────────────────────────────────────────────
  # Windows 打包：生成 .msi 和 .exe（NSIS）
  # ────────────────────────────────────────────
  build-windows:
    name: Windows 打包
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm install

      - name: 打包 Windows（msi + nsis）
        run: npm run tauri build -- --bundles msi,nsis

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ────────────────────────────────────────────
  # 发布 Release：tag 触发时自动创建
  # ────────────────────────────────────────────
  release:
    name: 发布 GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            linux-packages/**/*.deb
            linux-packages/**/*.rpm
            windows-packages/**/*.msi
            windows-packages/**/*.exe
